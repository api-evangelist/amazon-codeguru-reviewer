    apis:
    - Amazon CodeGuru Reviewer API
    actions: &id001
    - AssociateRepository
    - ListRepositoryAssociations
  - name: codereviews
    apis:
    - Amazon CodeGuru Reviewer API
    actions: &id003
    - CreateCodeReview
    - ListCodeReviews
  - name: '{CodeReviewArn}'
