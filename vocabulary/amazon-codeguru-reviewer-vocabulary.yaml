vocabulary: 1.0.0
info:
  provider: Amazon CodeGuru Reviewer
  description: Taxonomy of Amazon CodeGuru Reviewer APIs.
  created: '2026-04-19'
  modified: '2026-04-19'
operational:
  apis:
  - name: Amazon CodeGuru Reviewer API
    namespace: codegurureviewer
    version: '2019-09-19'
    baseUrl: https://codeguru-reviewer.us-east-1.amazonaws.com
    status: active
  resources:
